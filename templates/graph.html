<h2>Graph</h2>

<canvas id="myChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = {{labels | safe}};
const data = {{values | safe}};

new Chart(document.getElementById('myChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'E-Waste',
            data: data
        }]
    }
});
</script>
